name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8
        run: flake8 app.py test_app.py --max-line-length=120
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest test_app.py -v --tb=short
  dependency-scan:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run dependency vulnerability scan
        run: pip-audit -r requirements.txt --format json --output pip-audit-report.json || true

      - name: Display scan results
        if: always()
        run: |
          if [ -f pip-audit-report.json ]; then
            pip-audit -r requirements.txt || true
          fi

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: ignore

  build-and-push:
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, sast]
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.meta.outputs.tags }}
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    env:
      IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/cicd-demo-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/cicd-demo-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Upload VEX document
        uses: actions/upload-artifact@v4
        with:
          name: cicd-demo-app-vex
          path: vex/openvex.json

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Print outputs
        run: |
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Image ref: ${{ steps.meta.outputs.tags }}"

  provenance:
    needs: [build-and-push]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ vars.DOCKERHUB_USERNAME }}/cicd-demo-app
      digest: ${{ needs.build-and-push.outputs.image_digest }}
      registry-username: ${{ vars.DOCKERHUB_USERNAME }}
      private-repository: true
    secrets:
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: write
      actions: read
    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Generate SBOM for pushed image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/cicd-demo-app@${{ needs.build-and-push.outputs.image_digest }}
          format: spdx-json
          artifact-name: cicd-demo-app.spdx.json

  secret-scan:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/python